<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Interativo -</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .counter-section {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 18px;
            padding: 26px 24px;
            margin: 50px auto;
            max-width: 760px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
        }

        .counter-section h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        .counter-section p {
            margin: 0 0 20px;
            color: #4b5563;
        }

        .counter-card {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            background: #f3f4f6;
            padding: 16px 22px;
            border-radius: 999px;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.08);
        }

        .counter-card button {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #111827;
            color: white;
            font-size: 1.65rem;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .counter-card button:hover {
            background: #374151;
            transform: scale(1.05);
        }

        #counter-value {
            min-width: 70px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
        }

        .counter-actions {
            margin-top: 18px;
        }

        .counter-actions button {
            border: 1px solid #d1d5db;
            background: #ffffff;
            color: #111827;
            padding: 10px 18px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .counter-actions button:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #111827;
            font-weight: 700;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <section class="counter-section" aria-label="Contador interativo">
            <h1>Contador Interativo</h1>
            <p>Use os botões para aumentar, diminuir ou resetar o contador.</p>
            <div class="counter-card">
                <button id="decrement" type="button" aria-label="Diminuir">-</button>
                <span id="counter-value">0</span>
                <button id="increment" type="button" aria-label="Aumentar">+</button>
            </div>
            <div class="counter-actions">
                <button id="reset" type="button">Resetar</button>
            </div>
            <a href="index.html" class="back-link">Voltar</a>
        </section>
    </main>
    <script>
        const counterValue = document.getElementById('counter-value');
        const decrementBtn = document.getElementById('decrement');
        const incrementBtn = document.getElementById('increment');
        const resetBtn = document.getElementById('reset');
        let count = 0;

        function updateDisplay() {
            counterValue.textContent = count;
        }

        incrementBtn.addEventListener('click', () => {
            count += 1;
            updateDisplay();
        });

        decrementBtn.addEventListener('click', () => {
            count -= 1;
            updateDisplay();
        });

        resetBtn.addEventListener('click', () => {
            count = 0;
            updateDisplay();
        });
    </script>
</body>
</html>
